# Rust formatting configuration for deep-postgres
# Follows Rust community conventions with minor adjustments for readability

edition = "2021"
max_width = 100
tab_spaces = 4
newline_style = "Unix"
use_small_heuristics = "Default"

# Imports
imports_granularity = "Module"
group_imports = "StdExternalCrate"
reorder_imports = true

# Comments
wrap_comments = true
comment_width = 100
normalize_comments = true

# Formatting
format_code_in_doc_comments = true
format_strings = false
