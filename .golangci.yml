run:
    timeout: 5m
    tests: true

linters:
    enable:
        - errcheck
        - gosimple
        - govet
        - ineffassign
        - staticcheck
        - unused
        - gofmt
        - goimports
        - misspell
        - revive
        - unconvert
        - unparam
        - exportloopref
        - prealloc
        - godot

linters-settings:
    goimports:
        local-prefixes: github.com/kumarlokesh/deep-postgres
    revive:
        rules:
            - name: exported
              severity: warning
            - name: unexported-return
              severity: warning
            - name: var-naming
              severity: warning
    godot:
        scope: declarations
        capital: false

issues:
    exclude-rules:
        # _pad fields in binary-layout structs are intentionally unexported.
        - linters: [revive, unused]
          text: "_pad"
        # doc.go files often have short package-level comments.
        - linters: [godot]
          path: doc\.go
