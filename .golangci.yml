version: "2"

run:
    timeout: 5m
    tests: true

linters:
    default: none
    enable:
        - govet
        - ineffassign
        - staticcheck
        - unused
        - misspell
        - unconvert
        - unparam
        - prealloc
        - godot

formatters:
    enable:
        - gofmt
        - goimports
    settings:
        goimports:
            local-prefixes:
                - github.com/kumarlokesh/deep-postgres

linters-settings:
    godot:
        scope: declarations
        capital: false

issues:
    exclude-rules:
        # _pad fields in binary-layout structs are intentionally unexported.
        - linters: [revive, unused]
          text: "_pad"
        # doc.go files often have short package-level comments.
        - linters: [godot]
          path: doc\.go
